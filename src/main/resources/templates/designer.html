
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Architecture Designer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Designer CSS -->
    <link rel="stylesheet" th:href="@{/css/designer.css}">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">
        <i class="fa-solid fa-diagram-project"></i>
        <h3>Architecture Playground</h3>
    </div>

    <ul>

        <li>
            <a th:href="@{/}">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a th:href="@{/architectures-page}">
                <i class="fa-solid fa-building"></i>
                Architectures
            </a>
        </li>

        <li>
            <a th:href="@{/components-page}">
                <i class="fa-solid fa-cubes"></i>
                Components
            </a>
        </li>

        <li>
            <a th:href="@{/connections-page}">
                <i class="fa-solid fa-link"></i>
                Connections
            </a>
        </li>

        <li>
            <a th:href="@{/simulation-page}">
                <i class="fa-solid fa-chart-line"></i>
                Simulation
            </a>
        </li>

        <li class="active">
            <a th:href="@{/designer-page}">
                <i class="fa-solid fa-diagram-project"></i>
                Designer
            </a>
        </li>

    </ul>

</div>

<!-- Main Content -->

<div class="main-content">

    <!-- Top Bar -->

    <div class="topbar">

        <div>

            <h2>Architecture Designer</h2>

            <p>Create and visualize your software architecture.</p>

        </div>

        <div class="profile">

            <i class="fa-solid fa-user-circle"></i>

            <span>Satya Brata</span>

        </div>

    </div>

    <!-- Architecture Selector -->

    <div class="designer-header">

        <div class="row">

            <div class="col-md-6">

                <label class="form-label">

                    Select Architecture

                </label>

                <select
                        id="architectureSelect"
                        class="form-select">

                    <option value="">

                        Loading...

                    </option>

                </select>

            </div>

        </div>

    </div>

   <div class="toolbar">

    <button
        id="addComponentBtn"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#addComponentModal">

    <i class="fa-solid fa-plus"></i>

    Add Component

</button>

    <button id="addConnectionBtn" class="btn btn-info">
        <i class="fa-solid fa-link"></i>
        Add Connection
    </button>

    <button id="autoLayoutBtn" class="btn btn-warning">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        Auto Layout
    </button>

    <button id="saveLayoutBtn" class="btn btn-success">
        <i class="fa-solid fa-floppy-disk"></i>
        Save Layout
    </button>

    <button id="loadLayoutBtn" class="btn btn-secondary">
        <i class="fa-solid fa-folder-open"></i>
        Load Layout
    </button>

    <button id="simulationBtn" class="btn btn-danger">
        <i class="fa-solid fa-play"></i>
        Run Simulation
    </button>

</div>
    <!-- Designer Canvas -->

    <div id="designerCanvas">

        <!-- JavaScript will dynamically create nodes here -->

    </div>

    <!-- ==========================================
     Add Component Modal
========================================== -->

<div class="modal fade"
     id="addComponentModal"
     tabindex="-1"
     aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content bg-dark text-white">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="fa-solid fa-plus"></i>

                    Add Component

                </h5>

                <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">

                        Component Name

                    </label>

                    <input
                            id="componentName"
                            type="text"
                            class="form-control"
                            placeholder="Enter component name">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Component Type

                    </label>

                    <select
                            id="componentType"
                            class="form-select">

                        <option value="CLIENT">Client</option>

                        <option value="LOAD_BALANCER">Load Balancer</option>

                        <option value="API_GATEWAY">API Gateway</option>

                        <option value="SERVICE">Service</option>

                        <option value="DATABASE">Database</option>

                        <option value="CACHE">Cache</option>

                        <option value="QUEUE">Queue</option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                        id="createComponentBtn"
                        class="btn btn-primary">

                    Create Component

                </button>

            </div>

        </div>

    </div>

</div>

  

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- jsPlumb -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsPlumb/2.15.6/js/jsplumb.min.js"></script>

<!-- Designer Modules -->
<script th:src="@{/js/designer/icons.js}"></script>
<script th:src="@{/js/designer/layout.js}"></script>
...
<script th:src="@{/js/designer/add-component.js}"></script>
<script th:src="@{/js/designer/designer.js}"></script>

<!-- jsPlumb -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsPlumb/2.15.6/js/jsplumb.min.js"></script>

<!-- Designer Modules -->

<script th:src="@{/js/designer/icons.js}"></script>

<script th:src="@{/js/designer/layout.js}"></script>

<script th:src="@{/js/designer/drag.js}"></script>

<script th:src="@{/js/designer/connections.js}"></script>

<script th:src="@{/js/designer/save-layout.js}"></script>

<script th:src="@{/js/designer/load-layout.js}"></script>

<script th:src="@{/js/designer/simulation.js}"></script>

<script th:src="@{/js/designer/add-component.js}"></script>

<!-- Main Controller -->

<script th:src="@{/js/designer/designer.js}"></script>


</body>

</html>
