<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Component Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/component.css}">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-diagram-project"></i>

        <h3>Architecture Playground</h3>

    </div>

    <ul>

        <li>
            <a th:href="@{/}">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a th:href="@{/architectures-page}">
                <i class="fa-solid fa-building"></i>
                Architectures
            </a>
        </li>

        <li class="active">
            <a th:href="@{/components-page}">
                <i class="fa-solid fa-cubes"></i>
                Components
            </a>
        </li>

        <li>
            <a th:href="@{/connections-page}">
                <i class="fa-solid fa-link"></i>
                Connections
            </a>
        </li>

        <li>
            <a th:href="@{/simulation-page}">
                <i class="fa-solid fa-chart-line"></i>
                Simulation
            </a>
        </li>

    </ul>

</div>

<!-- Main Content -->

<div class="main-content">

    <div class="topbar">

        <div>

            <h2>Component Management</h2>

            <p>Create and manage software components.</p>

        </div>

        <div class="profile">

            <i class="fa-solid fa-user-circle"></i>

            <span>Satya Brata</span>

        </div>

    </div>

    <!-- Create Component -->

    <div class="content-box">

        <h3>Create Component</h3>

        <form id="componentForm">

            <div class="mb-3">

                <label class="form-label">

                    Architecture

                </label>

                <select
                        id="architectureSelect"
                        class="form-select"
                        required>

                    <option value="">

                        Select Architecture

                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Component Name

                </label>

                <input
                        id="componentName"
                        type="text"
                        class="form-control"
                        placeholder="Enter Component Name"
                        required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Component Type

                </label>

                <select
                        id="componentType"
                        class="form-select">

                    <option value="CLIENT">CLIENT</option>

                    <option value="LOAD_BALANCER">LOAD BALANCER</option>

                    <option value="API_GATEWAY">API GATEWAY</option>

                    <option value="SERVICE">SERVICE</option>

                    <option value="DATABASE">DATABASE</option>

                    <option value="CACHE">CACHE</option>

                    <option value="QUEUE">QUEUE</option>

                </select>

            </div>

            <button
                    type="submit"
                    class="btn btn-primary">

                <i class="fa-solid fa-plus"></i>

                Create Component

            </button>

        </form>

    </div>

    <!-- Components Table -->

    <div class="content-box">

        <h3>Available Components</h3>

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Architecture</th>

                    <th>Name</th>

                    <th>Type</th>

                    <th>Delete</th>

                </tr>

                </thead>

                <tbody id="componentTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script th:src="@{/js/component.js}"></script>

</body>

</html>
